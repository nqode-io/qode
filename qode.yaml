project:
    name: qode
    topology: single
    layers:
        - name: default
          path: .
          stack: go
          test:
            unit: go test ./...
            lint: golangci-lint run
            build: go build ./...
review:
    min_code_score: 8
    min_security_score: 8
scoring:
    refine_target_score: 25
ide:
    cursor:
        enabled: true
    claude_code:
        enabled: true
knowledge:
    path: .qode/knowledge
