qode_version: 0.3.3-beta
review:
    min_code_score: 10
    min_security_score: 10
scoring:
    strict: true
ide:
    cursor:
        enabled: true
    claude_code:
        enabled: true
    codex:
        enabled: true
knowledge:
    path: .qode/knowledge
diff:
    command: git diff --merge-base origin/HEAD -- :(exclude).qode/
