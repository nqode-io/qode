version: 2

project_name: qode

before:
  hooks:
    - go mod tidy

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

builds:
  - id: qode
    main: ./cmd/qode/
    binary: qode
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}+{{ .Env.BUILD_NUMBER }}

archives:
  - id: qode
    name_template: '{{ .ProjectName }}_{{ if .IsSnapshot }}{{ .Version }}{{ else }}{{ .Tag }}{{ end }}_{{ .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: nqode-io
    name: qode

brews:
  - name: qode
    repository:
      owner: nqode-io
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/nqode-io/qode"
    description: "Generates structured AI prompts for a standardized developer workflow"
    license: "MIT"
    test: |
      system "#{bin}/qode", "--version"
