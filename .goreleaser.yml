version: 2

project_name: qode

before:
  hooks:
    - go mod tidy

snapshot:
  version_template: "{{ .Version }}"

builds:
  - id: qode
    main: ./cmd/qode/
    binary: qode
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}+{{ .Env.BUILD_NUMBER }}

archives:
  - id: qode
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: nqode-io
    name: qode
