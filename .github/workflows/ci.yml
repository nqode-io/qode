name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go build ./...

      - run: go test ./...

      - run: go test -tags integration ./internal/cli/...

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
